<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mini Mencore Bot Detector</title>

<style>
body {
    font-family: Arial;
    background: #0b1a2a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: orange;
    cursor: pointer;
    font-weight: bold;
}

#resultBox {
    margin-top: 30px;
    padding: 20px;
    background: #132b45;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 Mini Mencore Bot Detector</h1>

<input type="text" id="link" placeholder="Paste WhatsApp Channel Link" size="40"><br>

<input type="text" id="numbers" placeholder="Paste reaction numbers (comma separated)">
<br>

<button onclick="analyze()">Analyze</button>

<div id="resultBox"></div>

<script>
function analyze() {

    const link = document.getElementById("link").value;
    const input = document.getElementById("numbers").value;

    if (!input) {
        alert("Enter reaction numbers!");
        return;
    }

    // Convert input to array
    let reactions = input.split(",").map(num => parseInt(num.trim()));

    // Total reactions
    const total = reactions.reduce((a, b) => a + b, 0);

    // Exact extraction
    const love = reactions[0] || 0;
    const like = reactions[1] || 0;
    const laugh = reactions[2] || 0;

    // Others
    const others = total - (love + like + laugh);

    // Percentage
    const lovePercent = (love / total) * 100;

    let result = "";
    let confidence = "";

    // ✅ YOUR FINAL RULE (60%)
    if (lovePercent >= 60) {
        result = "🚨 BOT REACTION DETECTED";

        if (lovePercent >= 80) {
            confidence = "High (90–95%)";
        } else if (lovePercent >= 70) {
            confidence = "Medium (75–85%)";
        } else {
            confidence = "Low (60–70%)";
        }

    } else {
        result = "✅ ORGANIC REACTIONS";
        confidence = "High (85–90%)";
    }

    // Output
    document.getElementById("resultBox").innerHTML = `
        <h2>${result}</h2>
        <p><b>WhatsApp Link:</b><br>${link}</p>

        <p>
        ❤️ Love: ${love} <br>
        👍 Like: ${like} <br>
        😂 Laugh: ${laugh} <br>
        📦 Others: ${others}
        </p>

        <p><b>Total:</b> ${total}</p>
        <p><b>Love Percentage:</b> ${lovePercent.toFixed(2)}%</p>
        <p><b>Confidence:</b> ${confidence}</p>
    `;
}
</script>

</body>
</html>
