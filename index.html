<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mencore AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#050d1a;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
    padding:20px;
}

h1{
    color:#00ffc3;
}

button{
    background:#00ffc3;
    border:none;
    padding:15px;
    font-weight:bold;
    cursor:pointer;
}

#status{
    color:yellow;
    margin-top:10px;
}

.box{
    border:2px solid #00ffc3;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

canvas{
    margin-top:20px;
    background:#111;
}
</style>
</head>

<body>

<h1>🟢 Mencore AI Dashboard</h1>

<input type="file" id="imageInput"><br><br>

<button onclick="scanImage()">⚡ SCAN IMAGE</button>

<div id="status">Waiting...</div>

<div class="box" id="result"></div>

<canvas id="chart"></canvas>

<script>

let chartInstance = null;

async function scanImage(){

    const file = document.getElementById("imageInput").files[0];

    if(!file){
        alert("Upload image first!");
        return;
    }

    document.getElementById("status").innerText = "⚡ Scanning with Ultra AI...";

    const { data:{ text } } = await Tesseract.recognize(
        file,
        'eng',
        { logger: m => console.log(m) }
    );

    console.log("OCR TEXT:", text);

    analyze(text);
}

function analyze(text){

    text = text.replace(/\n/g, " ");

    // GET TOTAL REACTIONS (TOP NUMBER)
    let totalMatch = text.match(/(\d+)\s*reactions/i);
    let total = totalMatch ? parseInt(totalMatch[1]) : 0;

    // GET ALL NUMBERS
    let numbers = text.match(/\d+/g)?.map(Number) || [];

    console.log("ALL NUMBERS:", numbers);

    /*
    Expected format:
    [649, 499, 103, 31, 8, 5, 3]
    */

    let love=0, like=0, laugh=0, wow=0, pray=0, sad=0;

    if(numbers.length >= 7){

        // First = total reactions
        total = numbers[0];

        // Next numbers follow WhatsApp layout
        love = numbers[1];
        like = numbers[2];
        laugh = numbers[3];
        wow = numbers[4];
        pray = numbers[5];
        sad = numbers[6];
    }

    // SAFETY FIX (if total missing)
    if(total === 0){
        total = love + like + laugh + wow + pray + sad;
    }

    // CALCULATE LOVE %
    let lovePercent = total ? (love / total) * 100 : 0;

    // BOT DETECTION RULE (YOUR RULE)
    let verdict = "";
    if(lovePercent >= 80){
        verdict = "⚠️ BOT REACTION DETECTED";
    }else{
        verdict = "✅ ORGANIC / MIXED REACTIONS";
    }

    // DISPLAY RESULT
    document.getElementById("result").innerHTML = `
    <h3>📊 Analysis Result</h3>

    Total Reactions: <b>${total}</b><br><br>

    ❤️ Love: ${love}<br>
    👍 Like: ${like}<br>
    😂 Laugh: ${laugh}<br>
    😮 Wow: ${wow}<br>
    🙏 Pray: ${pray}<br>
    😢 Sad: ${sad}<br><br>

    ❤️ Love %: ${lovePercent.toFixed(2)}%<br><br>

    <b>${verdict}</b>
    `;

    drawChart(love, like, laugh, wow, sad, pray);

    document.getElementById("status").innerText = "✅ Scan Complete";
}


// GRAPH FUNCTION
function drawChart(love, like, laugh, wow, sad, pray){

    const ctx = document.getElementById('chart');

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['❤️','👍','😂','😮','😢','🙏'],
            datasets: [{
                label: 'Reactions',
                data: [love, like, laugh, wow, sad, pray]
            }]
        }
    });
}

</script>

</body>
</html>
