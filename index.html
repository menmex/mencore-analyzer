<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mencore AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0a0f1c;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
}

.container {
    margin-top: 20px;
}

img {
    max-width: 80%;
    border: 1px solid #00ffcc;
}

button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

.dashboard {
    margin-top: 20px;
    display: none;
}

.box {
    border: 1px solid #00ffcc;
    padding: 15px;
    margin: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🟢 Mencore AI Dashboard</h2>

<input type="file" id="imageInput"><br><br>
<img id="preview"><br><br>

<button onclick="runOCR()">SCAN IMAGE</button>

<div id="loading">⚡ AI scanning...</div>

<div class="dashboard" id="dashboard">

<div class="box" id="verdictBox"></div>

<canvas id="chart" width="300" height="300"></canvas>

</div>

</div>

<script>

let imageFile;

document.getElementById("imageInput").addEventListener("change", function(e){
    imageFile = e.target.files[0];
    let reader = new FileReader();
    reader.onload = () => document.getElementById("preview").src = reader.result;
    reader.readAsDataURL(imageFile);
});

function clean(text){
    return text.replace(/\n/g," ").replace(/[^0-9❤️👍😂😮😢🔥 ]/g,"");
}

function find(text, emoji){
    let i = text.indexOf(emoji);
    if(i === -1) return 0;
    let part = text.substring(i, i+15);
    let num = part.match(/\d+/);
    return num ? parseInt(num[0]) : 0;
}

function runOCR(){
    if(!imageFile){
        alert("Upload image first");
        return;
    }

    document.getElementById("loading").innerText = "⚡ Scanning...";
    document.getElementById("dashboard").style.display = "none";

    Tesseract.recognize(imageFile,'eng').then(({ data: { text } }) => {

        let t = clean(text);

        let love = find(t,"❤️");
        let like = find(t,"👍");
        let laugh = find(t,"😂");
        let wow = find(t,"😮");
        let sad = find(t,"😢");

        let arr = [love, like, laugh, wow, sad];

        if(arr.every(v => v === 0)){
            let nums = t.match(/\d+/g) || [];
            nums = nums.map(Number);
            love = nums[0] || 0;
            like = nums[1] || 0;
            laugh = nums[2] || 0;
            wow = nums[3] || 0;
            sad = nums[4] || 0;
        }

        let total = love + like + laugh + wow + sad;
        let lovePercent = total ? (love/total)*100 : 0;

        let verdict = "";

        if(lovePercent >= 80){
            verdict = "⚠️ BOT-LIKE MIX DETECTED";
        } else if(lovePercent >= 50){
            verdict = "🤔 SUSPICIOUS ENGAGEMENT";
        } else {
            verdict = "✅ ORGANIC REACTIONS";
        }

        document.getElementById("loading").innerText = "✅ Done";

        document.getElementById("verdictBox").innerHTML = `
        <h3>${verdict}</h3>
        Total: ${total}<br>
        Love %: ${lovePercent.toFixed(1)}%
        `;

        document.getElementById("dashboard").style.display = "block";

        // Chart
        new Chart(document.getElementById("chart"), {
            type: 'bar',
            data: {
                labels: ["❤️","👍","😂","😮","😢"],
                datasets: [{
                    label: "Reactions",
                    data: [love, like, laugh, wow, sad]
                }]
            }
        });

    });
}

</script>

</body>
</html>
