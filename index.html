<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mencore AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0a0f1c;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
    padding:20px;
}

h1{
    color:#00ffc3;
}

.box{
    border:1px solid #00ffc3;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

button{
    background:#00ffc3;
    border:none;
    padding:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#loading{
    display:none;
    color:yellow;
    font-size:18px;
}

canvas{
    margin-top:20px;
    background:#fff;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🟢 Mencore AI Dashboard</h1>

<input type="file" id="imageInput"><br><br>

<button onclick="analyze()">⚡ SCAN IMAGE</button>

<div id="loading">⚡ Scanning reactions with AI...</div>

<div id="result"></div>

<canvas id="chart"></canvas>

<script>

async function analyze(){

    const file = document.getElementById("imageInput").files[0];
    if(!file){
        alert("Upload image first");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    const img = URL.createObjectURL(file);

    const { data: { text } } = await Tesseract.recognize(
        img,
        'eng',
        { logger: m => console.log(m) }
    );

    console.log("OCR TEXT:", text);

    // 🔍 Extract numbers
    let numbers = text.match(/\d+/g)?.map(n => parseInt(n)) || [];

    if(numbers.length < 4){
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerHTML =
        "❌ Could not detect reactions clearly. Try clearer image.";
        return;
    }

    // ✅ FIRST NUMBER = TOTAL
    let total = numbers[0];

    // Reactions
    let love = numbers[1] || 0;
    let like = numbers[2] || 0;
    let laugh = numbers[3] || 0;
    let wow = numbers[4] || 0;
    let pray = numbers[5] || 0;
    let sad = numbers[6] || 0;

    // 🔢 Calculate total from emojis
    let calculatedTotal = love + like + laugh + wow + pray + sad;

    // 🎯 Accuracy
    let accuracy = (calculatedTotal / total) * 100;

    let warning = "";
    if(calculatedTotal !== total){
        warning = "⚠️ Mismatch detected (OCR may be imperfect)";
    }

    // 🔥 YOUR BOT RULE
    let others = like + laugh + wow + sad + pray;

    let botDetected = false;

    if(others > 0 && love >= (1.8 * others)){
        botDetected = true;
    }

    let resultText = botDetected
        ? "⚠️ BOT REACTION DETECTED (Love ≥ 80% more than others)"
        : "✅ Organic / Mixed reactions";

    let ratio = others > 0 ? (love / others).toFixed(2) : "∞";

    document.getElementById("loading").style.display = "none";

    // 📊 RESULT DISPLAY
    document.getElementById("result").innerHTML = `
        <div class="box">
        <b>Total (From Image):</b> ${total}<br>
        <b>Calculated Total:</b> ${calculatedTotal}<br>
        <b>Accuracy:</b> ${accuracy.toFixed(2)}%<br>
        ${warning}<br><br>

        ❤️ Love: ${love}<br>
        👍 Like: ${like}<br>
        😂 Laugh: ${laugh}<br>
        😮 Wow: ${wow}<br>
        🙏 Pray: ${pray}<br>
        😢 Sad: ${sad}<br><br>

        <b>Others Total:</b> ${others}<br>
        <b>Love vs Others Ratio:</b> ${ratio}x<br><br>

        <b>${resultText}</b>
        </div>
    `;

    // 📊 GRAPH
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['❤️','👍','😂','😮','🙏','😢'],
            datasets: [{
                label: 'Reactions',
                data: [love, like, laugh, wow, pray, sad]
            }]
        }
    });

}

</script>

</body>
</html>
