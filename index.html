<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mencore AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0a0f1c;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
    padding:20px;
}
h1{color:#00ffc3;}

.box{
    border:1px solid #00ffc3;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

button{
    background:#00ffc3;
    border:none;
    padding:15px;
    font-weight:bold;
    cursor:pointer;
}

#loading{
    display:none;
    font-size:18px;
    color:yellow;
}

#result{
    margin-top:20px;
    font-size:18px;
}

canvas{
    margin-top:20px;
    background:#fff;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🟢 Mencore AI Dashboard</h1>

<input type="file" id="imageInput"><br><br>

<button onclick="analyze()">⚡ SCAN IMAGE</button>

<div id="loading">⚡ Scanning with Ultra AI...</div>

<div id="result"></div>

<canvas id="chart"></canvas>

<script>

async function analyze(){

    const file = document.getElementById("imageInput").files[0];
    if(!file){
        alert("Upload image first");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    const img = URL.createObjectURL(file);

    const { data: { text } } = await Tesseract.recognize(
        img,
        'eng',
        {
            logger: m => console.log(m)
        }
    );

    console.log("OCR TEXT:", text);

    // Extract numbers
    const numbers = text.match(/\d+/g);

    if(!numbers || numbers.length < 3){
        document.getElementById("result").innerHTML =
        "❌ Could not detect reactions properly";
        document.getElementById("loading").style.display = "none";
        return;
    }

    // Assign values based on WhatsApp layout
    let love = parseInt(numbers[1]) || 0;
    let like = parseInt(numbers[2]) || 0;
    let laugh = parseInt(numbers[3]) || 0;
    let wow = parseInt(numbers[4]) || 0;
    let sad = parseInt(numbers[5]) || 0;
    let pray = parseInt(numbers[6]) || 0;

    let total = love + like + laugh + wow + sad + pray;

    let lovePercent = (love / total) * 100;

    let resultText = "";

    if(lovePercent >= 80){
        resultText = "⚠️ BOT-LIKE PATTERN DETECTED (Love unusually high)";
    } else {
        resultText = "✅ Organic / Mixed reactions";
    }

    document.getElementById("loading").style.display = "none";

    document.getElementById("result").innerHTML = `
        <div class="box">
        <b>Total:</b> ${total}<br><br>

        ❤️ Love: ${love}<br>
        👍 Like: ${like}<br>
        😂 Laugh: ${laugh}<br>
        😮 Wow: ${wow}<br>
        😢 Sad: ${sad}<br>
        🙏 Pray: ${pray}<br><br>

        <b>Love %:</b> ${lovePercent.toFixed(2)}%<br><br>

        <b>${resultText}</b>
        </div>
    `;

    // Draw Chart
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['❤️','👍','😂','😮','😢','🙏'],
            datasets: [{
                label: 'Reactions',
                data: [love, like, laugh, wow, sad, pray]
            }]
        }
    });

}

</script>

</body>
</html>
