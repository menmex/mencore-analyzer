<script>

// Start analysis with spinner
function startAnalysis() {

    document.getElementById("output").innerHTML = `
        <div class="spinner"></div>
        <p>Analyzing reaction pattern...</p>
    `;

    setTimeout(() => {
        analyze();
    }, 6000);
}

// Main logic
function analyze() {

    const link = document.getElementById("link").value;
    const love = Number(document.getElementById("love").value);
    const like = Number(document.getElementById("like").value);
    const laugh = Number(document.getElementById("laugh").value);
    const total = Number(document.getElementById("total").value);

    if (!total || love > total) {
        document.getElementById("output").innerHTML = "❌ Invalid input";
        return;
    }

    const others = total - (love + like + laugh);
    const lovePercent = (love / total) * 100;

    let result = "";
    let confidence = "";

    // ✅ UPDATED RULE (59%)
    if (lovePercent >= 59) {

        result = "🚨 BOT REACTION DETECTED";

        // 🔥 NEW CONFIDENCE (2% - 5% boost)
        let minConf = lovePercent + (lovePercent * 0.02);
        let maxConf = lovePercent + (lovePercent * 0.05);

        if (maxConf > 100) maxConf = 100;

        confidence = `${minConf.toFixed(2)}% - ${maxConf.toFixed(2)}%`;

    } else {

        result = "✅ ORGANIC REACTIONS";
        confidence = "Natural";
    }

    document.getElementById("output").innerHTML = `
        <h3>${result}</h3>

        <p><b>Link:</b> ${link || "N/A"}</p>

        <p>
        ❤️ ${love} | 👍 ${like} | 😂 ${laugh} | 📦 ${others}
        </p>

        <p>Total: ${total}</p>
        <p>Confidence: ${confidence}</p>
    `;
}

// Clear function
function clearFields() {
    document.getElementById("link").value = "";
    document.getElementById("love").value = "";
    document.getElementById("like").value = "";
    document.getElementById("laugh").value = "";
    document.getElementById("total").value = "";
    document.getElementById("output").innerHTML = "";
}

</script>
