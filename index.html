<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Mencore Bot Detector</title>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 20px;
    }
    input, button {
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: none;
    }
    input {
        width: 250px;
    }
    button {
        background: orange;
        cursor: pointer;
        font-weight: bold;
    }
    .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        margin-top: 20px;
    }
    img {
        max-width: 200px;
        margin-top: 10px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>🔥 Mini Mencore Bot Detector</h1>

<!-- WhatsApp Link -->
<input id="link" placeholder="Paste WhatsApp Channel Link"><br>

<!-- Image Upload -->
<input type="file" id="imageInput" accept="image/*"><br>
<img id="preview" style="display:none;"/>

<h3>Enter Reactions</h3>
<input id="views" placeholder="Views"><br>

<input id="love" placeholder="❤️"><br>
<input id="laugh" placeholder="😂"><br>
<input id="wow" placeholder="😮"><br>
<input id="sad" placeholder="😢"><br>
<input id="like" placeholder="👍"><br>

<button onclick="analyze()">Analyze</button>

<div class="card" id="resultBox" style="display:none;">
    <h2 id="result"></h2>
    <p id="details"></p>
</div>

<script>
// Image preview
document.getElementById("imageInput").onchange = function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById("preview");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};

// Detection Algorithm
function detectBotReaction(data) {
    const { reactions, views } = data;

    const total = Object.values(reactions).reduce((a,b)=>a+b,0);
    if (total === 0 || views === 0) return { result: "No data", score: 0 };

    const max = Math.max(...Object.values(reactions));
    const dominant = (max / total) * 100;

    const unique = Object.values(reactions).filter(v=>v>0).length;
    const diversity = unique / Object.keys(reactions).length;

    const ratio = total / views;

    let score = 0;
    let rules = [];

    if (dominant >= 85) { score += 35; rules.push("Extreme dominance"); }
    else if (dominant >= 75) { score += 25; rules.push("High dominance"); }

    if (diversity <= 0.3) { score += 20; rules.push("Low diversity"); }

    if (ratio >= 0.7) { score += 30; rules.push("High ratio"); }
    else if (ratio >= 0.5) { score += 20; rules.push("Medium ratio"); }

    if (dominant > 80 && ratio > 0.6) {
        score += 15;
        rules.push("Combo trigger");
    }

    let result = "";
    if (score >= 75) result = "🚨 Likely Bot Reactions";
    else if (score >= 45) result = "⚠️ Suspicious Activity";
    else result = "✅ Looks Natural";

    return {
        total,
        dominant: dominant.toFixed(2),
        diversity: diversity.toFixed(2),
        ratio: ratio.toFixed(2),
        score,
        rules,
        result
    };
}

// Analyze function
function analyze() {
    const data = {
        reactions: {
            "❤️": Number(document.getElementById("love").value),
            "😂": Number(document.getElementById("laugh").value),
            "😮": Number(document.getElementById("wow").value),
            "😢": Number(document.getElementById("sad").value),
            "👍": Number(document.getElementById("like").value)
        },
        views: Number(document.getElementById("views").value)
    };

    const res = detectBotReaction(data);

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("result").innerText = res.result;

    document.getElementById("details").innerText =
        `Score: ${res.score}
Total Reactions: ${res.total}
Dominant %: ${res.dominant}%
Diversity: ${res.diversity}
Ratio: ${res.ratio}

Triggered Rules:
- ${res.rules.join("\n- ")}`;
}
</script>

</body>
</html>
