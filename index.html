<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Mencore</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a1f44, #1e90ff);
    color: white;
    text-align: center;
}

/* Container */
.container {
    margin-top: 60px;
    padding: 20px;
}

/* Title */
h1 {
    font-size: 40px;
    margin-bottom: 5px;
}

/* Subtitle */
h2 {
    font-size: 18px;
    font-weight: normal;
    margin-top: 0;
    opacity: 0.9;
}

/* Powered */
.powered {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 30px;
}

/* Inputs */
input {
    width: 250px;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Button */
button {
    background: #00bfff;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    background: #009acd;
}

/* Result box */
.result {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    display: inline-block;
    min-width: 300px;
}
</style>
</head>

<body>

<div class="container">

<h1>Mini Mencore</h1>
<h2>Bot Reaction Detector</h2>
<div class="powered">Powered by Menmex</div>

<input type="text" id="link" placeholder="WhatsApp Channel Link"><br>

<input type="number" id="love" placeholder="❤️ Love"><br>
<input type="number" id="like" placeholder="👍 Like"><br>
<input type="number" id="laugh" placeholder="😂 Laugh"><br>
<input type="number" id="total" placeholder="📊 Total"><br>

<button onclick="analyze()">Analyze</button>

<div class="result" id="output"></div>

</div>

<script>
function analyze() {

    const link = document.getElementById("link").value;
    const love = Number(document.getElementById("love").value);
    const like = Number(document.getElementById("like").value);
    const laugh = Number(document.getElementById("laugh").value);
    const total = Number(document.getElementById("total").value);

    if (!total || love > total) {
        alert("Invalid input");
        return;
    }

    const others = total - (love + like + laugh);
    const lovePercent = (love / total) * 100;

    let result = "";
    let confidence = "";

    if (lovePercent >= 60) {

        result = "🚨 BOT REACTION DETECTED";

        let conf = lovePercent + 13;
        if (conf > 100) conf = 100;

        confidence = conf.toFixed(2) + "%";

    } else {

        result = "✅ ORGANIC REACTIONS";
        confidence = "Natural";
    }

    document.getElementById("output").innerHTML = `
        <h3>${result}</h3>

        <p><b>Link:</b> ${link || "N/A"}</p>

        <p>
        ❤️ ${love} | 👍 ${like} | 😂 ${laugh} | 📦 ${others}
        </p>

        <p>Total: ${total}</p>
        <p>Confidence: ${confidence}</p>
    `;
}
</script>

</body>
</html>
