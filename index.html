<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Mencore Bot Detector</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}
input, button {
    padding: 10px;
    margin: 6px;
    border-radius: 8px;
    border: none;
}
button {
    background: orange;
    font-weight: bold;
    cursor: pointer;
}
.card {
    background: #1e293b;
    padding: 20px;
    margin-top: 20px;
    border-radius: 12px;
}
img {
    max-width: 220px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🔥 Mini Mencore Bot Detector</h1>

<input id="link" placeholder="WhatsApp Channel Link"><br>

<input type="file" id="imageInput" accept="image/*"><br>
<img id="preview" style="display:none;"><br>

<input id="total" placeholder="Total Reactions (optional)"><br>

<button onclick="analyze()">Analyze</button>

<div class="card" id="resultBox" style="display:none;">
    <h2 id="result"></h2>
    <pre id="details"></pre>
</div>

<script>

// Preview image
document.getElementById("imageInput").onchange = function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById("preview");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};

// MAIN FUNCTION
async function analyze() {

    const file = document.getElementById("imageInput").files[0];
    const link = document.getElementById("link").value;

    if (!file) {
        alert("Upload image first");
        return;
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("result").innerText = "⏳ Scanning image...";

    const { data: { text } } = await Tesseract.recognize(file, 'eng');

    console.log("OCR TEXT:", text);

    let numbers = text.match(/\d+/g)?.map(Number) || [];

    if (numbers.length === 0) {
        document.getElementById("result").innerText = "❌ No numbers detected";
        return;
    }

    // 🔥 Sort numbers descending
    numbers.sort((a, b) => b - a);

    // 🔥 First = total reactions
    let detectedTotal = numbers[0];

    // 🔥 Use input total if provided
    let inputTotal = Number(document.getElementById("total").value);
    let total = inputTotal > 0 ? inputTotal : detectedTotal;

    // 🔥 Exact reactions
    let love = numbers[1] || 0;
    let like = numbers[2] || 0;
    let laugh = numbers[3] || 0;

    // 🔥 Others (remaining numbers)
    let othersArray = numbers.slice(4);
    let others = othersArray.reduce((a, b) => a + b, 0);

    // 🔥 Calculate love %
    let lovePercentage = (love / total) * 100;

    // 🔥 Detection rule
    let result = "";
    if (lovePercentage >= 80) {
        result = "🚨 Bot Reaction Detected (Mixed Reactions)";
    } else if (lovePercentage >= 60) {
        result = "⚠️ Suspicious Activity";
    } else {
        result = "✅ Natural Reactions";
    }

    // 🔥 Display result
    document.getElementById("result").innerText = result;

    document.getElementById("details").innerText =
`WhatsApp Link:
${link}

Detected Numbers:
${numbers.join(", ")}

❤️ Love: ${love}
👍 Like: ${like}
😂 Laugh: ${laugh}
✨ Other Reactions: ${others}

Total: ${total}

Love Percentage: ${lovePercentage.toFixed(2)}%`;
}

</script>

</body>
</html>
