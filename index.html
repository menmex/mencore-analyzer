<!DOCTYPE html>
<html>
<head>
  <title>Reaction Judge V5</title>
</head>

<body style="font-family:sans-serif; max-width:400px; margin:auto;">

<h2>📊 Reaction Judge</h2>

<!-- WhatsApp Link -->
<label>WhatsApp Link:</label><br>
<input type="text" id="link" style="width:100%;"><br><br>

<!-- Confirmation Reaction Values -->
<h3>Confirmation Reaction Values</h3>

<label>❤️ Love:</label><br>
<input type="number" id="love"><br><br>

<label>👍 Like:</label><br>
<input type="number" id="like"><br><br>

<label>😂 Laugh:</label><br>
<input type="number" id="laugh"><br><br>

<label>📊 Total Reactions:</label><br>
<input type="number" id="total"><br><br>

<button onclick="analyze()">Analyze</button>

<h3>Result:</h3>
<pre id="output"></pre>

<script>
function analyze() {
  let love = parseInt(document.getElementById('love').value) || 0;
  let like = parseInt(document.getElementById('like').value) || 0;
  let laugh = parseInt(document.getElementById('laugh').value) || 0;
  let total = parseInt(document.getElementById('total').value) || 0;

  if (total === 0) {
    document.getElementById('output').innerText = "❌ Enter total reactions";
    return;
  }

  // Calculate other reactions
  let other = total - (love + like + laugh);
  if (other < 0) other = 0;

  // Calculate percentages
  let loveP = (love / total) * 100;
  let likeP = (like / total) * 100;
  let laughP = (laugh / total) * 100;
  let otherP = (other / total) * 100;

  // Apply 60% rule
  let dominant = [];

  if (loveP >= 60) dominant.push("❤️ Love");
  if (likeP >= 60) dominant.push("👍 Like");
  if (laughP >= 60) dominant.push("😂 Laugh");
  if (otherP >= 60) dominant.push("🔥 Other");

  let result = "";

  result += "Love: " + love + "\n";
  result += "Like: " + like + "\n";
  result += "Laugh: " + laugh + "\n";
  result += "Other: " + other + "\n\n";

  if (dominant.length > 0) {
    result += "🔥 Dominant Reaction (≥60%):\n";
    dominant.forEach(d => result += d + "\n");
  } else {
    result += "❌ No reaction reached 60%";
  }

  document.getElementById('output').innerText = result;
}
</script>

</body>
</html>
